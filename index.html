<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Dr. Xiaomi · Pantallas</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Fondo OSCURO como el original */
    :root {
      --bg-primary: #0a0a0a;
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #020617;
      --surface: rgba(30, 41, 59, 0.9);
      --surface-hover: rgba(51, 65, 85, 0.95);
      --border: rgba(148, 163, 184, 0.2);
      --text-primary: #ffffff;
      --text-secondary: #94a3b8;
      --accent: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.3);
      --success: #10b981;
      --card-radius: 16px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #1f2933 0, #020617 45%, #000 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .app {
      max-width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
    }

    .header {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 10px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
      transition: transform 0.1s ease;
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 40px 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .search-actions {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .cards-view {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      padding-bottom: 80px;
    }

    .product-card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: var(--card-radius);
      padding: 12px;
      border: 1px solid var(--border);
      transition: transform 0.1s ease, background 0.2s ease;
    }

    .product-card:active {
      transform: scale(0.98);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--accent);
    }

    .card-model {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
      font-size: 11px;
    }

    .card-type {
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,0,0,0.3);
    }

    .card-type.oled {
      color: #f97316;
    }

    .card-type.lcd {
      color: #60a5fa;
    }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--success);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 30px;
      background: rgba(16, 185, 129, 0.15);
      transition: all 0.1s ease;
    }

    .card-price:active {
      background: var(--success);
      color: white;
    }

    .card-actions-group {
      display: flex;
      gap: 6px;
    }

    .image-btn, .whatsapp-btn {
      border: none;
      padding: 5px 10px;
      border-radius: 30px;
      color: white;
      font-size: 10px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .image-btn:active, .whatsapp-btn:active {
      transform: scale(0.95);
    }

    .image-btn {
      background: #3b82f6;
    }

    .whatsapp-btn {
      background: #25D366;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 16px 16px;
      gap: 8px;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 30px;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.1s ease;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--surface);
    }

    .nav-item i {
      font-size: 20px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 24px;
      padding: 20px;
      max-width: 300px;
      width: 100%;
    }

    .modal-content h3 {
      margin-bottom: 14px;
      font-size: 18px;
      color: var(--accent);
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      color: white;
      font-size: 12px;
      z-index: 150;
      animation: fadeInUp 0.2s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .results-count {
      padding: 8px 16px;
      font-size: 12px;
      color: var(--text-secondary);
      background: rgba(0,0,0,0.3);
      margin: 4px 12px;
      border-radius: 30px;
      text-align: center;
    }

    .skeleton-card {
      background: var(--surface);
      border-radius: var(--card-radius);
      padding: 12px;
    }

    .skeleton {
      background: linear-gradient(90deg, rgba(30,41,59,0.5) 25%, rgba(51,65,85,0.7) 50%, rgba(30,41,59,0.5) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
      height: 80px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state i {
      font-size: 48px;
      opacity: 0.5;
      margin-bottom: 12px;
    }

    /* Scrollbar personalizado */
    .main-content::-webkit-scrollbar {
      width: 3px;
    }

    .main-content::-webkit-scrollbar-track {
      background: var(--surface);
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📱</div>
        <h1>Dr. Xiaomi</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="techModeBtn" title="Modo Técnico">
          <i class="fas fa-microchip"></i>
        </button>
        <button class="icon-btn" id="receiptBtn" title="Recibo">
          <i class="fas fa-receipt"></i>
        </button>
        <button class="icon-btn" id="shuffleBtn" title="Mezclar productos">
          <i class="fas fa-random"></i>
        </button>
      </div>
    </div>
    
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar modelo...">
      <div class="search-actions">
        <button id="clearSearchBtn"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div id="resultsCount" class="results-count"></div>
    <div id="resultsContainer"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Inicio</span></button>
    <button class="nav-item" data-tab="compare"><i class="fas fa-chart-line"></i><span>Comparar</span></button>
  </nav>
</div>

<div id="techModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-microchip"></i> Modo Técnico</h3>
    <input type="password" id="techPassword" placeholder="Clave">
    <div class="modal-buttons">
      <button onclick="closeModal('techModal')">Cancelar</button>
      <button id="confirmTechBtn">Acceder</button>
    </div>
  </div>
</div>

<script>
  // Configuración
  const CONFIG = {
    dataSources: [
      { name: "J&A", url: "https://xiaomi.scz.red/precio/data/ja2.csv" },
      { name: "CentralCell", url: "https://xiaomi.scz.red/precio/data/centralcel.csv" },
      { name: "Osmobil", url: "https://xiaomi.scz.red/precio/data/osmobil.csv" },
      { name: "CFH LP", url: "https://xiaomi.scz.red/precio/data/CFH.csv" },
      { name: "BITE", url: "https://xiaomi.scz.red/precio/data/boe.csv" }
    ],
    passwords: { tech: "123456" }
  };

  let allData = [];
  let filteredData = [];
  let techMode = false;
  let currentTab = "home";
  let popupWindow = null;

  const container = document.getElementById("resultsContainer");
  const searchInput = document.getElementById("searchInput");
  const resultsCount = document.getElementById("resultsCount");

  // Función para mezclar array (algoritmo Fisher-Yates)
  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  async function init() {
    showSkeleton();
    await loadData();
    setupEventListeners();
    // Mezclar resultados al inicio
    shuffleResults();
    render();
  }

  function shuffleResults() {
    if (allData.length > 0) {
      filteredData = shuffleArray(allData);
      updateResultsCount();
      render();
      showToast("🎲 Productos mezclados aleatoriamente");
    }
  }

  async function loadData() {
    try {
      allData = [];
      for (const source of CONFIG.dataSources) {
        try {
          const data = await fetchCSV(source.url, source.name);
          allData.push(...data);
        } catch (error) {
          console.error(`Error cargando ${source.name}:`, error);
        }
      }
      // Mezclar al cargar
      filteredData = shuffleArray(allData);
      updateResultsCount();
      render();
    } catch (error) {
      showError();
    }
  }

  async function fetchCSV(url, providerName) {
    const response = await fetch(url);
    const text = await response.text();
    return parseCSV(text, providerName);
  }

  function parseCSV(text, providerName) {
    const lines = text.split("\n").filter(line => line.trim() !== "");
    if (lines.length < 2) return [];
    
    const data = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      
      const columns = parseCSVLine(line);
      
      if (columns.length >= 6) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const proveedor = cleanText(columns[3]) || providerName;
        const precio_compra = parsePrice(columns[4]);
        const precio_venta = parsePrice(columns[5]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: proveedor,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      } else if (columns.length >= 5) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const precio_compra = parsePrice(columns[3]);
        const precio_venta = parsePrice(columns[4]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: providerName,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      }
    }
    return data;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === "," && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result.map(field => field.replace(/^"|"$/g, ""));
  }

  function cleanText(text) {
    if (!text) return "";
    return text.trim().replace(/^"|"$/g, "");
  }

  function parsePrice(priceStr) {
    if (!priceStr || priceStr.trim() === "") return 0;
    let str = priceStr.toString().trim();
    str = str.replace(/[^\d.,-]/g, "");
    const num = parseFloat(str.replace(/,/g, "."));
    if (isNaN(num)) return 0;
    return Math.round(num);
  }

  function render() {
    if (!container) return;
    
    let dataToShow = filteredData;
    
    if (currentTab === "compare") {
      showCompareModal();
      return;
    }
    
    container.innerHTML = renderCards(dataToShow);
    updateResultsCount();
  }

  function renderCards(data) {
    if (data.length === 0) {
      return `<div class="empty-state"><i class="fas fa-search"></i><p>No se encontraron resultados</p></div>`;
    }
    
    return `
      <div class="cards-view">
        ${data.map((item) => `
          <div class="product-card">
            <div class="card-header">
              <div>
                <div class="card-title">${escapeHtml(item.marca)}</div>
                <div class="card-model">${escapeHtml(item.modelo)}</div>
              </div>
            </div>
            <div class="card-specs">
              <span class="card-type ${item.tipo === 'OLED' ? 'oled' : 'lcd'}">${item.tipo}</span>
              ${techMode ? `<span style="color: #fbbf24;">📦 ${escapeHtml(item.proveedor)}</span>` : ''}
              ${techMode ? `<span style="color: #fbbf24;">💰 Compra: Bs. ${item.compra.toLocaleString()}</span>` : ''}
            </div>
            <div class="card-price-row">
              <span class="card-price" onclick="copyPriceToClipboard('${item.id}')">Bs. ${item.venta.toLocaleString()}</span>
              <div class="card-actions-group">
                <button class="image-btn" onclick="openGooglePopup('${item.id}')"><i class="fab fa-google"></i> LCD</button>
                <button class="whatsapp-btn" onclick="shareToWhatsApp('${item.id}')"><i class="fab fa-whatsapp"></i></button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // Abrir ventana popup con Google Images
  function openGooglePopup(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const searchTerm = `LCD ${product.modelo} ${product.marca} pantalla repuesto`;
    const encodedTerm = encodeURIComponent(searchTerm);
    const googleUrl = `https://www.google.com/search?q=${encodedTerm}&tbm=isch`;
    
    const width = Math.min(450, screen.width - 40);
    const height = Math.min(650, screen.height - 80);
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    
    const features = [
      `width=${width}`,
      `height=${height}`,
      `left=${left}`,
      `top=${top}`,
      'toolbar=yes',
      'location=yes',
      'menubar=yes',
      'scrollbars=yes',
      'resizable=yes'
    ].join(',');
    
    popupWindow = window.open(googleUrl, 'GoogleImagesPopup', features);
    if (popupWindow) popupWindow.focus();
    if (navigator.vibrate) navigator.vibrate(50);
    showToast(`🔍 Buscando: ${product.modelo}`);
  }

  function search(term) {
    if (!term.trim()) {
      filteredData = shuffleArray([...allData]);
    } else {
      const lowerTerm = term.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      filteredData = allData.filter(item => {
        const modeloNorm = item.modelo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const marcaNorm = item.marca.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return modeloNorm.includes(lowerTerm) || marcaNorm.includes(lowerTerm);
      });
    }
    render();
  }

  function updateResultsCount() {
    if (resultsCount) {
      const count = filteredData.length;
      resultsCount.textContent = `📱 ${count} producto${count !== 1 ? 's' : ''}`;
    }
  }

  function copyPriceToClipboard(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const message = `📱 *PRECIO DE PANTALLA*\n${product.marca} ${product.modelo}\n💰 Precio: Bs. ${product.venta.toLocaleString()}`;
    
    navigator.clipboard.writeText(message).then(() => {
      showToast("✅ Precio copiado");
      if (navigator.vibrate) navigator.vibrate(50);
    }).catch(() => {
      showToast("❌ Error al copiar");
    });
  }

  function shareToWhatsApp(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const message = `📱 *PRECIO DE PANTALLA*\n${product.marca} ${product.modelo}\n💰 Precio: Bs. ${product.venta.toLocaleString()}`;
    const encoded = encodeURIComponent(message);
    window.open(`https://wa.me/?text=${encoded}`, "_blank");
    if (navigator.vibrate) navigator.vibrate(50);
  }

  function showTechModal() {
    document.getElementById("techModal").style.display = "flex";
    document.getElementById("techPassword").focus();
  }

  function closeModal(modalId) {
    document.getElementById(modalId).style.display = "none";
    const input = document.querySelector(`#${modalId} input`);
    if (input) input.value = "";
  }

  function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  function showSkeleton() {
    if (container) {
      container.innerHTML = `
        <div class="cards-view">
          ${Array(6).fill().map(() => `
            <div class="skeleton-card">
              <div class="skeleton"></div>
            </div>
          `).join('')}
        </div>
      `;
    }
  }

  function showError() {
    if (container) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Error cargando datos</p>
          <button onclick="location.reload()" style="margin-top: 16px; padding: 10px 20px; background: #f97316; border: none; border-radius: 30px; color: white;">Reintentar</button>
        </div>
      `;
    }
  }

  function showCompareModal() {
    const compareData = filteredData.slice(0, 4);
    let html = '<div style="display: flex; flex-direction: column; gap: 10px;">';
    compareData.forEach(p => {
      html += `
        <div style="background: var(--surface); padding: 12px; border-radius: 12px; border-left: 3px solid var(--accent);">
          <strong style="color: var(--accent);">${escapeHtml(p.marca)}</strong>
          <div>${escapeHtml(p.modelo)}</div>
          <div style="font-size: 11px; color: var(--text-secondary);">${p.tipo}</div>
          <div style="font-size: 18px; font-weight: 700; color: var(--success); margin-top: 8px;">Bs. ${p.venta.toLocaleString()}</div>
        </div>
      `;
    });
    html += '</div><div class="modal-buttons" style="margin-top: 16px;"><button onclick="closeModal(\'compareModal\')" style="flex:1; padding: 10px; background: var(--accent); border: none; border-radius: 30px; color: white;">Cerrar</button></div>';
    
    const modalHtml = `
      <div id="compareModal" class="modal" style="display: flex;">
        <div class="modal-content" style="max-width: 350px;">
          <h3><i class="fas fa-chart-line"></i> Comparar</h3>
          ${html}
        </div>
      </div>
    `;
    
    const existing = document.getElementById("compareModal");
    if (existing) existing.remove();
    document.body.insertAdjacentHTML("beforeend", modalHtml);
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  function setupEventListeners() {
    searchInput?.addEventListener("input", (e) => search(e.target.value));
    
    document.getElementById("clearSearchBtn")?.addEventListener("click", () => {
      searchInput.value = "";
      search("");
    });
    
    document.getElementById("techModeBtn")?.addEventListener("click", showTechModal);
    
    document.getElementById("shuffleBtn")?.addEventListener("click", () => {
      shuffleResults();
    });
    
    document.getElementById("confirmTechBtn")?.addEventListener("click", () => {
      const pwd = document.getElementById("techPassword").value;
      if (pwd === CONFIG.passwords.tech) {
        techMode = true;
        closeModal("techModal");
        showToast("✅ Modo técnico activado");
        render();
      } else {
        showToast("❌ Clave incorrecta");
        if (navigator.vibrate) navigator.vibrate(200);
      }
    });
    
    document.getElementById("receiptBtn")?.addEventListener("click", () => {
      window.open("http://xiaomi.scz.red/1/", "_blank");
      if (navigator.vibrate) navigator.vibrate(50);
    });
    
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        currentTab = item.dataset.tab;
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        item.classList.add("active");
        render();
        if (navigator.vibrate) navigator.vibrate(30);
      });
    });
  }

  // Exponer funciones globales
  window.copyPriceToClipboard = copyPriceToClipboard;
  window.shareToWhatsApp = shareToWhatsApp;
  window.openGooglePopup = openGooglePopup;
  window.closeModal = closeModal;

  init();
</script>
</body>
</html>
