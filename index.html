<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF6900">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Catálogo de pantallas y repuestos - Precios actualizados">
  <title>DR. XIAOMI | Pantallas y Repuestos</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --xiaomi-orange: #FF6900;
      --xiaomi-orange-dark: #E55A00;
      --xiaomi-orange-soft: #FF8A3C;
      --xiaomi-black: #1A1A1A;
      --xiaomi-dark: #2C2C2C;
      --xiaomi-gray: #F5F5F5;
      --xiaomi-gray-light: #FAFAFA;
      --xiaomi-gray-medium: #E0E0E0;
      --xiaomi-gray-dark: #757575;
      --xiaomi-white: #FFFFFF;
      --xiaomi-success: #00C853;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.05);
      --transition: all 0.2s ease;
    }

    [data-theme="light"] {
      --bg-primary: #F8F8F8;
      --bg-secondary: #FFFFFF;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --border: #E8E8E8;
      --card-border: #DDDDDD;
      --separator: #FF6900;
    }

    [data-theme="dark"] {
      --bg-primary: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --bg-card: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --border: #2A2A2A;
      --card-border: #333333;
      --separator: #FF6900;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      transition: background 0.3s ease;
    }

    .app {
      max-width: 100%;
      height: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
    }

    .header {
      background: var(--bg-primary);
      border-bottom: 2px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--xiaomi-orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: white;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .logo span {
      font-weight: 400;
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      border-radius: 30px;
      padding: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px;
      transition: var(--transition);
    }

    .icon-btn:active {
      transform: scale(0.95);
      color: var(--xiaomi-orange);
    }

    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      transition: var(--transition);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--xiaomi-orange);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-actions {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-actions button {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Quick Filters */
    .quick-filters {
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: thin;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
    }

    .quick-filters::-webkit-scrollbar {
      height: 2px;
    }

    .filter-chip {
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
    }

    .filter-chip.active {
      background: var(--xiaomi-orange);
      color: white;
      border-color: var(--xiaomi-orange);
    }

    .filter-chip:active {
      transform: scale(0.95);
    }

    .cards-view {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 16px;
      padding-bottom: 70px;
    }

    .product-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 18px;
      border: 2px solid var(--card-border);
      transition: var(--transition);
      position: relative;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .product-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      background: var(--separator);
      border-radius: 4px;
    }

    .product-card:active {
      transform: scale(0.98);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      padding-left: 8px;
    }

    .card-brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--xiaomi-orange);
      letter-spacing: -0.2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-model {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      line-height: 1.3;
    }

    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0;
      padding-left: 8px;
    }

    .card-type {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .card-type.oled {
      background: rgba(255, 105, 0, 0.12);
      color: var(--xiaomi-orange);
      border-color: rgba(255, 105, 0, 0.3);
    }

    .supplier-badge, .price-badge {
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 2px solid var(--border);
      padding-left: 8px;
    }

    .card-price {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: -0.5px;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .card-price:active {
      color: var(--xiaomi-orange);
      background: rgba(255, 105, 0, 0.1);
      transform: scale(0.98);
    }

    .card-actions-group {
      display: flex;
      gap: 10px;
    }

    .image-btn, .whatsapp-btn {
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .image-btn:active, .whatsapp-btn:active {
      transform: scale(0.95);
    }

    .image-btn {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .whatsapp-btn {
      background: #25D366;
      color: white;
    }

    /* ============================================ */
    /* BOTTOM NAVIGATION - VERSIÓN COMPACTA MÁS BAJA */
    /* ============================================ */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 6px 20px 12px;
      gap: 8px;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 8px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 12px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition);
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-item.active {
      color: var(--xiaomi-orange);
      background: rgba(255, 105, 0, 0.08);
    }

    .nav-item i {
      font-size: 18px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 24px;
      max-width: 300px;
      width: 100%;
      border: 2px solid var(--border);
    }

    .modal-content h3 {
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-content input {
      width: 100%;
      padding: 14px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      margin-bottom: 16px;
    }

    .modal-content input:focus {
      outline: none;
      border-color: var(--xiaomi-orange);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: var(--transition);
    }

    .modal-buttons button:first-child {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .modal-buttons button:last-child {
      background: var(--xiaomi-orange);
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      padding: 8px 16px;
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      z-index: 150;
      animation: fadeInUp 0.2s ease;
      border: 1px solid var(--xiaomi-orange);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .results-count {
      padding: 14px 20px 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: left;
    }

    .skeleton-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 18px;
      border: 2px solid var(--border);
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--border) 50%, var(--bg-secondary) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 12px;
      height: 100px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 48px;
      opacity: 0.3;
      margin-bottom: 16px;
    }

    .main-content::-webkit-scrollbar {
      width: 4px;
    }

    .main-content::-webkit-scrollbar-track {
      background: var(--border);
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--xiaomi-orange);
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">MI</div>
        <h1>DR XIAOMI <span>CatalogO</span></h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="themeToggle" title="Tema">
          <i class="fas fa-moon"></i>
        </button>
        <button class="icon-btn" id="techModeBtn" title="Modo Técnico">
          <i class="fas fa-microchip"></i>
        </button>
        <button class="icon-btn" id="receiptBtn" title="Recibo">
          <i class="fas fa-receipt"></i>
        </button>
        <button class="icon-btn" id="shuffleBtn" title="Mezclar">
          <i class="fas fa-random"></i>
        </button>
      </div>
    </div>
    
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar... Ej: A50, Note 10, Redmi">
      <div class="search-actions">
        <button id="clearSearchBtn"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </header>

  <!-- Quick Filters -->
  <div class="quick-filters" id="quickFilters">
    <button class="filter-chip active" data-filter="all">📱 Todos</button>
    <button class="filter-chip" data-filter="OLED">✨ OLED</button>
    <button class="filter-chip" data-filter="LCD">📟 LCD</button>
  </div>

  <div class="main-content">
    <div id="resultsCount" class="results-count"></div>
    <div id="resultsContainer"></div>
  </div>

  <!-- Bottom Navigation - VERSIÓN COMPACTA -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Inicio</span></button>
    <button class="nav-item" data-tab="compare"><i class="fas fa-chart-line"></i><span>Comparar</span></button>
  </nav>
</div>

<div id="techModal" class="modal">
  <div class="modal-content">
    <h3>🔐 Acceso Técnico</h3>
    <input type="password" id="techPassword" placeholder="Clave" autocomplete="off">
    <div class="modal-buttons">
      <button onclick="closeModal('techModal')">Cancelar</button>
      <button id="confirmTechBtn">Acceder</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FUNCIÓN DE BÚSQUEDA INTELIGENTE - NORMALIZA TEXTOS
  // ============================================================
  function normalizeSearchTerm(term) {
    return term
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[\s\-_]+/g, '')
      .replace(/[^\w\d]/g, '');
  }

  function normalizeForCompare(str) {
    return str
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[\s\-_]+/g, '')
      .replace(/[^\w\d]/g, '');
  }

  // ============================================================
  // CONFIGURACIÓN
  // ============================================================
  const CONFIG = {
    dataSources: [
      { name: "J&A", url: "https://xiaomi.scz.red/precio/data/ja2.csv" },
      { name: "CentralCell", url: "https://xiaomi.scz.red/precio/data/centralcel.csv" },
      { name: "Osmobil", url: "https://xiaomi.scz.red/precio/data/osmobil.csv" },
      { name: "MR PANTALLA", url: "https://xiaomi.scz.red/precio/data/mrpantalla.csv" },
      { name: "BOE", url: "https://xiaomi.scz.red/precio/data/boe.csv" }
    ],
    passwords: { tech: "123456" }
  };

  let allData = [];
  let filteredData = [];
  let techMode = false;
  let currentTab = "home";
  let currentFilter = "all";
  let popupWindow = null;
  let currentTheme = "light";

  const container = document.getElementById("resultsContainer");
  const searchInput = document.getElementById("searchInput");
  const resultsCount = document.getElementById("resultsCount");

  function performSearch(data, searchTerm) {
    if (!searchTerm.trim()) {
      return data;
    }
    
    const normalizedSearch = normalizeSearchTerm(searchTerm);
    
    return data.filter(item => {
      const normalizedModelo = normalizeForCompare(item.modelo);
      const normalizedMarca = normalizeForCompare(item.marca);
      
      return normalizedModelo.includes(normalizedSearch) || 
             normalizedMarca.includes(normalizedSearch);
    });
  }

  function applyFiltersAndSearch() {
    let data = [...allData];
    
    if (currentFilter !== "all") {
      data = data.filter(item => item.tipo === currentFilter);
    }
    
    const searchTerm = searchInput.value.trim();
    if (searchTerm) {
      data = performSearch(data, searchTerm);
    }
    
    filteredData = data;
    updateResultsCount();
    render();
  }

  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  async function init() {
    showSkeleton();
    await loadData();
    setupEventListeners();
    setupQuickFilters();
    shuffleResults();
    render();
    loadTheme();
  }

  function loadTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "dark") {
      currentTheme = "dark";
      document.documentElement.setAttribute("data-theme", "dark");
      const icon = document.querySelector("#themeToggle i");
      if (icon) icon.className = "fas fa-sun";
    } else {
      currentTheme = "light";
      document.documentElement.setAttribute("data-theme", "light");
      const icon = document.querySelector("#themeToggle i");
      if (icon) icon.className = "fas fa-moon";
    }
  }

  function toggleTheme() {
    if (currentTheme === "light") {
      currentTheme = "dark";
      document.documentElement.setAttribute("data-theme", "dark");
      document.querySelector("#themeToggle i").className = "fas fa-sun";
    } else {
      currentTheme = "light";
      document.documentElement.setAttribute("data-theme", "light");
      document.querySelector("#themeToggle i").className = "fas fa-moon";
    }
    localStorage.setItem("theme", currentTheme);
    render();
  }

  function shuffleResults() {
    if (allData.length > 0) {
      filteredData = shuffleArray(allData);
      updateResultsCount();
      render();
      showToast("🔄 Productos mezclados");
    }
  }

  function setupQuickFilters() {
    const filters = document.querySelectorAll(".filter-chip");
    filters.forEach(filter => {
      filter.addEventListener("click", () => {
        filters.forEach(f => f.classList.remove("active"));
        filter.classList.add("active");
        currentFilter = filter.dataset.filter;
        applyFiltersAndSearch();
      });
    });
  }

  async function loadData() {
    try {
      allData = [];
      for (const source of CONFIG.dataSources) {
        try {
          const data = await fetchCSV(source.url, source.name);
          allData.push(...data);
        } catch (error) {
          console.error(`Error cargando ${source.name}:`, error);
        }
      }
      filteredData = shuffleArray(allData);
      updateResultsCount();
      render();
    } catch (error) {
      showError();
    }
  }

  async function fetchCSV(url, providerName) {
    const response = await fetch(url);
    const text = await response.text();
    return parseCSV(text, providerName);
  }

  function parseCSV(text, providerName) {
    const lines = text.split("\n").filter(line => line.trim() !== "");
    if (lines.length < 2) return [];
    
    const data = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      
      const columns = parseCSVLine(line);
      
      if (columns.length >= 6) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const proveedor = cleanText(columns[3]) || providerName;
        const precio_compra = parsePrice(columns[4]);
        const precio_venta = parsePrice(columns[5]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: proveedor,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      } else if (columns.length >= 5) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const precio_compra = parsePrice(columns[3]);
        const precio_venta = parsePrice(columns[4]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: providerName,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      }
    }
    return data;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === "," && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result.map(field => field.replace(/^"|"$/g, ""));
  }

  function cleanText(text) {
    if (!text) return "";
    return text.trim().replace(/^"|"$/g, "");
  }

  function parsePrice(priceStr) {
    if (!priceStr || priceStr.trim() === "") return 0;
    let str = priceStr.toString().trim();
    str = str.replace(/[^\d.,-]/g, "");
    const num = parseFloat(str.replace(/,/g, "."));
    if (isNaN(num)) return 0;
    return Math.round(num);
  }

  function render() {
    if (!container) return;
    
    if (currentTab === "compare") {
      showCompareModal();
      return;
    }
    
    container.innerHTML = renderCards(filteredData);
  }

  function renderCards(data) {
    if (data.length === 0) {
      return `<div class="empty-state"><i class="fas fa-search"></i><p>No se encontraron resultados</p><p style="font-size: 12px; margin-top: 8px;">💡 Prueba con: A50, Note 10, Redmi</p></div>`;
    }
    
    return `
      <div class="cards-view">
        ${data.map((item) => `
          <div class="product-card">
            <div class="card-header">
              <div>
                <div class="card-brand">${escapeHtml(item.marca)}</div>
                <div class="card-model">${escapeHtml(item.modelo)}</div>
              </div>
            </div>
            <div class="card-specs">
              <span class="card-type ${item.tipo === 'OLED' ? 'oled' : ''}">${item.tipo}</span>
              ${techMode ? `<span class="supplier-badge">${escapeHtml(item.proveedor)}</span>` : ''}
              ${techMode ? `<span class="price-badge">Compra: ${item.compra.toLocaleString()} Bs</span>` : ''}
            </div>
            <div class="card-price-row">
              <span class="card-price" onclick="copyPriceToClipboard('${item.id}')">${item.venta.toLocaleString()} Bs</span>
              <div class="card-actions-group">
                <button class="image-btn" onclick="openGooglePopup('${item.id}')"><i class="fab fa-google"></i> LCD</button>
                <button class="whatsapp-btn" onclick="shareToWhatsApp('${item.id}')"><i class="fab fa-whatsapp"></i></button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function copyPriceToClipboard(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const message = `📱 ${product.marca} ${product.modelo}\n💰 Precio: ${product.venta.toLocaleString()} Bs.`;
    
    navigator.clipboard.writeText(message).then(() => {
      showToast("✅ Precio copiado");
      if (navigator.vibrate) navigator.vibrate(50);
    }).catch(() => {
      showToast("❌ Error al copiar");
    });
  }

  function shareToWhatsApp(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const message = `📱 *${product.marca} ${product.modelo}*\n💰 Precio: ${product.venta.toLocaleString()} Bs.`;
    const encoded = encodeURIComponent(message);
    window.open(`https://wa.me/?text=${encoded}`, "_blank");
    if (navigator.vibrate) navigator.vibrate(50);
  }

  function openGooglePopup(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    const searchTerm = `LCD ${product.modelo} ${product.marca} pantalla`;
    const encodedTerm = encodeURIComponent(searchTerm);
    const googleUrl = `https://www.google.com/search?q=${encodedTerm}&tbm=isch`;
    
    const width = Math.min(450, screen.width - 40);
    const height = Math.min(650, screen.height - 80);
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    
    const features = [
      `width=${width}`,
      `height=${height}`,
      `left=${left}`,
      `top=${top}`,
      'toolbar=yes',
      'location=yes',
      'menubar=yes',
      'scrollbars=yes',
      'resizable=yes'
    ].join(',');
    
    popupWindow = window.open(googleUrl, 'GoogleImagesPopup', features);
    if (popupWindow) popupWindow.focus();
    if (navigator.vibrate) navigator.vibrate(50);
    showToast(`🔍 Buscando: ${product.modelo}`);
  }

  function updateResultsCount() {
    if (resultsCount) {
      const count = filteredData.length;
      resultsCount.textContent = `${count} producto${count !== 1 ? 's' : ''}`;
    }
  }

  function showTechModal() {
    document.getElementById("techModal").style.display = "flex";
    document.getElementById("techPassword").focus();
  }

  function closeModal(modalId) {
    document.getElementById(modalId).style.display = "none";
    const input = document.querySelector(`#${modalId} input`);
    if (input) input.value = "";
  }

  function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  function showSkeleton() {
    if (container) {
      container.innerHTML = `
        <div class="cards-view">
          ${Array(6).fill().map(() => `
            <div class="skeleton-card">
              <div class="skeleton"></div>
            </div>
          `).join('')}
        </div>
      `;
    }
  }

  function showError() {
    if (container) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Error cargando datos</p>
          <button onclick="location.reload()" style="margin-top: 16px; padding: 12px 24px; background: var(--xiaomi-orange); border: none; border-radius: 30px; color: white; font-weight: 600;">Reintentar</button>
        </div>
      `;
    }
  }

  function showCompareModal() {
    const compareData = filteredData.slice(0, 4);
    let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
    compareData.forEach(p => {
      html += `
        <div style="background: var(--bg-secondary); padding: 14px; border-radius: 16px; border-left: 4px solid var(--xiaomi-orange);">
          <div style="font-size: 12px; color: var(--xiaomi-orange); font-weight: 700;">${escapeHtml(p.marca)}</div>
          <div style="font-size: 15px; font-weight: 600; margin: 4px 0;">${escapeHtml(p.modelo)}</div>
          <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">${p.tipo}</div>
          <div style="font-size: 22px; font-weight: 800; color: var(--text-primary);">${p.venta.toLocaleString()} Bs</div>
        </div>
      `;
    });
    html += '</div><div class="modal-buttons" style="margin-top: 16px;"><button onclick="closeCompareModal()" style="flex:1; padding: 12px; background: var(--xiaomi-orange); border: none; border-radius: 30px; color: white; font-weight: 600;">Cerrar</button></div>';
    
    const modalHtml = `
      <div id="compareModal" class="modal" style="display: flex;">
        <div class="modal-content" style="max-width: 350px;">
          <h3>📊 Comparar productos</h3>
          ${html}
        </div>
      </div>
    `;
    
    const existing = document.getElementById("compareModal");
    if (existing) existing.remove();
    document.body.insertAdjacentHTML("beforeend", modalHtml);
  }

  function closeCompareModal() {
    const modal = document.getElementById("compareModal");
    if (modal) modal.remove();
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  function setupEventListeners() {
    searchInput?.addEventListener("input", () => applyFiltersAndSearch());
    
    document.getElementById("clearSearchBtn")?.addEventListener("click", () => {
      searchInput.value = "";
      applyFiltersAndSearch();
    });
    
    document.getElementById("themeToggle")?.addEventListener("click", toggleTheme);
    document.getElementById("techModeBtn")?.addEventListener("click", showTechModal);
    document.getElementById("shuffleBtn")?.addEventListener("click", () => shuffleResults());
    
    document.getElementById("confirmTechBtn")?.addEventListener("click", () => {
      const pwd = document.getElementById("techPassword").value;
      if (pwd === CONFIG.passwords.tech) {
        techMode = true;
        closeModal("techModal");
        showToast("🔧 Modo técnico activado");
        render();
      } else {
        showToast("❌ Clave incorrecta");
        if (navigator.vibrate) navigator.vibrate(200);
      }
    });
    
    document.getElementById("receiptBtn")?.addEventListener("click", () => {
      window.open("http://xiaomi.scz.red/1/", "_blank");
      if (navigator.vibrate) navigator.vibrate(50);
    });
    
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        currentTab = item.dataset.tab;
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        item.classList.add("active");
        render();
        if (navigator.vibrate) navigator.vibrate(30);
      });
    });
  }

  // Exponer funciones globales
  window.copyPriceToClipboard = copyPriceToClipboard;
  window.shareToWhatsApp = shareToWhatsApp;
  window.openGooglePopup = openGooglePopup;
  window.closeModal = closeModal;
  window.closeCompareModal = closeCompareModal;

  init();
</script>
</body>
</html>
