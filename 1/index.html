<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FF6900">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>DR.Xiaomi · Recibo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* Xiaomi Modern Colors */
    :root {
      --xiaomi-orange: #FF6900;
      --xiaomi-orange-dark: #E55A00;
      --xiaomi-orange-soft: #FF8A3C;
      --xiaomi-black: #1A1A1A;
      --xiaomi-dark: #2C2C2C;
      --xiaomi-gray: #F5F5F5;
      --xiaomi-gray-light: #FAFAFA;
      --xiaomi-gray-medium: #E0E0E0;
      --xiaomi-gray-dark: #757575;
      --xiaomi-white: #FFFFFF;
      --xiaomi-success: #00C853;
      --transition: all 0.2s ease;
    }

    [data-theme="dark"] {
      --bg-primary: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --bg-card: #1A1A1A;
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0A0;
      --border: #2A2A2A;
      --card-border: #333333;
      --separator: #FF6900;
      --input-bg: #2C2C2C;
    }

    [data-theme="light"] {
      --bg-primary: #F8F8F8;
      --bg-secondary: #FFFFFF;
      --bg-card: #FFFFFF;
      --text-primary: #1A1A1A;
      --text-secondary: #666666;
      --border: #E8E8E8;
      --card-border: #E0E0E0;
      --separator: #FF6900;
      --input-bg: #F5F5F5;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1f2933 0, #020617 45%, #000 100%);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 16px;
      transition: background 0.3s ease;
    }

    [data-theme="light"] body {
      background: radial-gradient(circle at top, #e8e8e8 0, #f5f5f5 45%, #ffffff 100%);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: var(--bg-primary);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 2px solid var(--border);
      overflow: hidden;
    }

    header {
      background: var(--bg-secondary);
      padding: 16px 20px;
      text-align: center;
      border-bottom: 2px solid var(--border);
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--xiaomi-orange);
    }

    header h1 {
      color: var(--xiaomi-orange);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin: 0;
    }

    header p {
      color: var(--text-secondary);
      font-size: 11px;
      margin-top: 4px;
    }

    main {
      padding: 20px;
      background: var(--bg-primary);
    }

    fieldset {
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
      background: var(--bg-card);
      position: relative;
      transition: var(--transition);
    }

    fieldset::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      background: var(--separator);
      border-radius: 4px;
    }

    legend {
      padding: 0 12px;
      font-weight: 700;
      color: var(--xiaomi-orange);
      font-size: 13px;
      background: var(--bg-card);
      margin-left: 8px;
    }

    label {
      display: block;
      margin-top: 12px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    .required-field::after {
      content: " *";
      color: var(--xiaomi-orange);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: var(--transition);
      margin-top: 6px;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--xiaomi-orange);
    }

    .date-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }

    #pattern-container {
      position: relative;
      width: 100%;
      height: 220px;
      border: 2px solid var(--border);
      border-radius: 16px;
      background: var(--bg-primary);
      margin-top: 12px;
      overflow: hidden;
    }

    #pattern-container canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #pattern-sequence {
      margin-top: 10px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    #imagePreview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .preview-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid var(--border);
    }

    #photoCounter {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    .costos-container {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .costo-box {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: var(--bg-secondary);
      position: relative;
    }

    .costo-box::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      background: var(--separator);
      border-radius: 3px;
    }

    .costo-box label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 11px;
      margin-top: 0;
    }

    .costo-box input {
      text-align: right;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text-primary);
      margin-top: 6px;
      font-size: 18px;
      padding: 0;
    }

    .servicios-container {
      margin-top: 8px;
    }

    .servicio-item {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }

    .servicio-item input:first-child {
      flex: 3;
    }

    .servicio-item input[type="number"] {
      flex: 1.2;
      text-align: right;
    }

    .servicio-item button {
      flex: 0 0 36px;
      margin-top: 0;
      padding: 8px 0;
      border-radius: 30px;
      background: var(--bg-secondary);
      box-shadow: none;
      color: var(--text-secondary);
      border: 2px solid var(--border);
    }

    button {
      padding: 14px;
      background: var(--xiaomi-orange);
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      margin-top: 16px;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      width: 100%;
    }

    button:active {
      transform: scale(0.97);
    }

    #addServicio {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 2px solid var(--border);
      box-shadow: none;
      margin-top: 8px;
    }

    .whatsapp-action {
      display: none;
      background: rgba(37, 211, 102, 0.1);
      border: 2px solid #25D366;
      border-radius: 20px;
      padding: 16px;
      margin-top: 16px;
      text-align: center;
    }

    .whatsapp-action.show {
      display: block;
      animation: fadeInUp 0.3s ease;
    }

    .whatsapp-action h4 {
      color: #25D366;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .whatsapp-action p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .whatsapp-btn-pdf {
      background: #25D366;
      margin-top: 8px;
    }

    #confirmation {
      display: none;
      background: rgba(0, 200, 83, 0.12);
      color: var(--xiaomi-success);
      padding: 12px 16px;
      border-radius: 40px;
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      border: 2px solid var(--xiaomi-success);
    }

    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: var(--transition);
    }

    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    #loading div {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 24px;
      text-align: center;
      color: var(--text-primary);
      border: 2px solid var(--border);
    }

    .spinner {
      border: 3px solid var(--border);
      border-top: 3px solid var(--xiaomi-orange);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      .container { border-radius: 20px; }
      main { padding: 16px; }
      .servicio-item { flex-direction: column; align-items: stretch; }
      .servicio-item button { align-self: flex-end; width: 40px; }
      .costos-container { flex-direction: column; }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: var(--border);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--xiaomi-orange);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DR. XIAOMI</h1>
      <p>Servicio Técnico Especializado</p>
    </header>
    <main>
      <form id="formRecibo">
        <fieldset>
          <legend>DATOS DEL CLIENTE</legend>
          <div class="date-container">
            <span id="dateTimeDisplay"></span>
            <span id="numeroReciboDisplay"></span>
          </div>
          <label class="required-field">Nombre completo</label>
          <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
          <label class="required-field">Teléfono / WhatsApp</label>
          <input type="tel" id="telefono" required placeholder="75959450" pattern="[0-9]{7,8}">
        </fieldset>

        <fieldset>
          <legend>DISPOSITIVO</legend>
          <label class="required-field">Marca</label>
          <select id="marca" required>
            <option value="">Seleccionar</option>
            <option>Xiaomi</option><option>Samsung</option><option>Huawei</option>
            <option>Tecno</option><option>Honor</option><option>Infinix</option><option>iPhone</option>
          </select>
          <label class="required-field">Modelo</label>
          <input type="text" id="modelo" required placeholder="Ej: Redmi Note 10">
          <label>IMEI / Serial (opcional)</label>
          <input type="text" id="imei" placeholder="15 dígitos">
          <label class="required-field">¿Enciende?</label>
          <select id="enciende" required>
            <option value="">Seleccionar</option>
            <option>Sí</option><option>No</option><option>A veces</option>
          </select>
        </fieldset>

        <fieldset>
          <legend>ESTADO Y FALLA</legend>
          <label>Estado del equipo</label>
          <textarea id="estado" rows="2" placeholder="Describa el estado físico del equipo"></textarea>
          <label>Falla reportada</label>
          <textarea id="falla" rows="2" placeholder="Describa la falla que presenta el equipo"></textarea>
        </fieldset>

        <fieldset>
          <legend>SEGURIDAD</legend>
          <label>Tipo de seguridad</label>
          <select id="tipoSeguridad">
            <option value="patron">Patrón</option>
            <option value="pin">PIN</option>
            <option value="ninguno">Ninguno</option>
          </select>
          <div id="pinContainer" style="display:none; margin-top: 12px">
            <label>PIN de acceso</label>
            <input type="password" id="pinInput" maxlength="6" placeholder="6 dígitos">
          </div>
        </fieldset>

        <fieldset id="field-patron">
          <legend>PATRÓN</legend>
          <div id="pattern-container">
            <canvas id="bgCanvas" width="300" height="220"></canvas>
            <canvas id="lineCanvas" width="300" height="220"></canvas>
          </div>
          <div id="pattern-sequence">Secuencia: –</div>
        </fieldset>

        <fieldset>
          <legend>FOTOS (máx. 4)</legend>
          <input type="file" id="fotos" accept="image/*" multiple>
          <div id="photoCounter">0/4 fotos seleccionadas</div>
          <div id="imagePreview"></div>
        </fieldset>
        
        <fieldset>
          <legend>SERVICIOS Y COSTOS</legend>
          <div class="servicios-container" id="serviciosList">
            <div class="servicio-item">
              <input type="text" class="servicio-desc" placeholder="Descripción del servicio">
              <input type="number" class="servicio-costo" placeholder="Bs." step="0.01" min="0">
              <button type="button" class="removeServicio" style="display:none">✕</button>
            </div>
          </div>
          <button type="button" id="addServicio">+ Añadir otro servicio</button>
          <div class="costos-container">
            <div class="costo-box">
              <label>TOTAL</label>
              <input type="number" id="costoTotal" placeholder="0.00" readonly>
            </div>
          </div>
        </fieldset>
        
        <input type="hidden" id="patternValue">
        <div id="confirmation">✅ Recibo generado con éxito</div>
        
        <div id="whatsappAction" class="whatsapp-action">
          <h4><i class="fab fa-whatsapp"></i> Enviar comprobante</h4>
          <p id="whatsappMessage"></p>
          <button id="sendWhatsappBtn" class="whatsapp-btn-pdf">
            <i class="fab fa-whatsapp"></i> Enviar por WhatsApp
          </button>
        </div>
        
        <button type="submit" id="generateBtn">
          <i class="fas fa-file-pdf"></i> Generar Recibo PDF
        </button>
      </form>
    </main>
  </div>
  
  <button class="theme-toggle" id="themeToggle">
    <i class="fas fa-sun"></i>
  </button>

  <div id="loading">
    <div>
      <div class="spinner"></div>
      <p>Generando recibo...</p>
    </div>
  </div>

  <script>
  // Tema
  let currentTheme = localStorage.getItem("xiaomi_theme") || "dark";
  function setTheme(theme) {
    currentTheme = theme;
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("xiaomi_theme", theme);
    const icon = document.querySelector("#themeToggle i");
    if (icon) icon.className = theme === "dark" ? "fas fa-sun" : "fas fa-moon";
  }
  setTheme(currentTheme);
  document.getElementById("themeToggle")?.addEventListener("click", () => {
    setTheme(currentTheme === "dark" ? "light" : "dark");
  });

  // Generar número de recibo basado en fecha y hora (DDMMYY-HHMMSS)
  function generarNumeroRecibo() {
    const fecha = new Date();
    const dia = String(fecha.getDate()).padStart(2, '0');
    const mes = String(fecha.getMonth() + 1).padStart(2, '0');
    const anio = String(fecha.getFullYear()).slice(-2);
    const horas = String(fecha.getHours()).padStart(2, '0');
    const minutos = String(fecha.getMinutes()).padStart(2, '0');
    const segundos = String(fecha.getSeconds()).padStart(2, '0');
    return `${dia}${mes}${anio}-${horas}${minutos}${segundos}`;
  }

  let ultimoReciboGenerado = null;
  let ultimoTelefono = null;
  let ultimoNombre = null;

  const config = {
    nombreTienda: "DR. XIAOMI SCZ",
    direccion: "Centro Comercial Cañoto #K1, Santa Cruz",
    telefono: "75959450",
    horario: "Lunes a Sábado 9:00 - 20:00"
  };

  function actualizarHeader() {
    const fechaSpan = document.getElementById('dateTimeDisplay');
    const numeroSpan = document.getElementById('numeroReciboDisplay');
    if (fechaSpan && numeroSpan) {
      fechaSpan.textContent = new Date().toLocaleString();
      numeroSpan.textContent = `REC-${generarNumeroRecibo()}`;
    }
  }
  
  document.addEventListener('DOMContentLoaded', () => {
    actualizarHeader();
    setInterval(actualizarHeader, 1000);

    // Toggle seguridad
    const tipo = document.getElementById('tipoSeguridad');
    const pinCont = document.getElementById('pinContainer');
    const fieldP = document.getElementById('field-patron');

    tipo.addEventListener('change', () => { 
      pinCont.style.display = (tipo.value === 'pin') ? 'block' : 'none'; 
      fieldP.style.display = (tipo.value === 'patron') ? 'block' : 'none'; 
    });
    pinCont.style.display = 'none';
    fieldP.style.display = 'block';
    
    // Vista previa de imágenes
    const fotosInput = document.getElementById('fotos');
    const imagePreview = document.getElementById('imagePreview');
    const photoCounter = document.getElementById('photoCounter');
    
    fotosInput.addEventListener('change', function() {
      imagePreview.innerHTML = '';
      const files = this.files;
      if (files.length > 4) {
        photoCounter.textContent = '❌ Máximo 4 fotos';
        photoCounter.style.color = '#ef4444';
        this.value = '';
        setTimeout(() => {
          photoCounter.textContent = '0/4 fotos seleccionadas';
          photoCounter.style.color = '';
        }, 2500);
        return;
      }
      photoCounter.textContent = `${files.length}/4 fotos seleccionadas`;
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (!file.type.match('image.*')) continue;
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.classList.add('preview-image');
          imagePreview.appendChild(img);
        }
        reader.readAsDataURL(file);
      }
    });

    // Servicios
    const serviciosList = document.getElementById('serviciosList');
    const addServicioBtn = document.getElementById('addServicio');
    const costoTotal = document.getElementById('costoTotal');
    
    function calcularTotal() {
      let total = 0;
      document.querySelectorAll('.servicio-costo').forEach(input => {
        total += parseFloat(input.value) || 0;
      });
      costoTotal.value = total.toFixed(2);
    }
    
    function addServicio() {
      const servicioItem = document.createElement('div');
      servicioItem.className = 'servicio-item';
      servicioItem.innerHTML = `
        <input type="text" class="servicio-desc" placeholder="Descripción del servicio">
        <input type="number" class="servicio-costo" placeholder="Bs." step="0.01" min="0">
        <button type="button" class="removeServicio">✕</button>
      `;
      serviciosList.appendChild(servicioItem);
      servicioItem.querySelector('.removeServicio').addEventListener('click', function() {
        serviciosList.removeChild(servicioItem);
        calcularTotal();
        updateRemoveButtons();
      });
      servicioItem.querySelector('.servicio-costo').addEventListener('input', calcularTotal);
      updateRemoveButtons();
    }
    
    function updateRemoveButtons() {
      const items = serviciosList.querySelectorAll('.servicio-item');
      items.forEach((item) => {
        const removeBtn = item.querySelector('.removeServicio');
        if (removeBtn) removeBtn.style.display = items.length > 1 ? 'flex' : 'none';
      });
    }
    
    addServicioBtn.addEventListener('click', addServicio);
    
    const firstCosto = serviciosList.querySelector('.servicio-costo');
    const firstRemove = serviciosList.querySelector('.removeServicio');
    if (firstCosto) firstCosto.addEventListener('input', calcularTotal);
    if (firstRemove) {
      firstRemove.addEventListener('click', function() {
        if (serviciosList.querySelectorAll('.servicio-item').length > 1) {
          serviciosList.removeChild(this.parentNode);
          calcularTotal();
          updateRemoveButtons();
        }
      });
    }
    updateRemoveButtons();
    
    // Validación teléfono
    document.getElementById('telefono').addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
    
    // PatternLock
    class PatternLock {
      constructor(){
        this.bg = document.getElementById('bgCanvas');
        this.ln = document.getElementById('lineCanvas');
        this.bgc = this.bg.getContext('2d');
        this.lnc = this.ln.getContext('2d');
        this.r = 20; 
        this.w = this.bg.width; 
        this.h = this.bg.height;
        this.pts = []; 
        this.path = []; 
        this.d = false;
        this.seqEl = document.getElementById('pattern-sequence');
        this.valEl = document.getElementById('patternValue');
        this.init();
      }
      init(){
        const cols=3, rows=3, margin=20;
        const sepX=(this.w-2*margin)/(cols-1), sepY=(this.h-2*margin)/(rows-1);
        let id=1;
        for(let y=0;y<rows;y++){
          for(let x=0;x<cols;x++){
            this.pts.push({id:id++,x:margin+sepX*x,y:margin+sepY*y,sel:false});
          }
        }
        this.draw(); 
        this.attach();
      }
      draw(){
        this.bgc.clearRect(0,0,this.w,this.h);
        this.bgc.strokeStyle='#4b5563'; 
        this.bgc.lineWidth=2;
        this.pts.forEach(p=>{
          this.bgc.beginPath();
          this.bgc.arc(p.x,p.y,this.r,0,2*Math.PI);
          this.bgc.stroke();
        });
      }
      attach(){
        ['mousedown','touchstart'].forEach(e=>this.ln.addEventListener(e,ev=>this.start(ev)));
        ['mousemove','touchmove'].forEach(e=>this.ln.addEventListener(e,ev=>this.move(ev)));
        ['mouseup','mouseleave','touchend'].forEach(e=>this.ln.addEventListener(e,()=>this.end()));
      }
      pos(e){
        const rect=this.ln.getBoundingClientRect(),
              t=e.touches?e.touches[0]:e;
        return {x:t.clientX-rect.left,y:t.clientY-rect.top};
      }
      hit(pt){
        return this.pts.find(p=>!p.sel&&Math.hypot(p.x-pt.x,p.y-pt.y)<this.r+5);
      }
      start(e){
        e.preventDefault();
        this.d=true;
        this.path=[];
        this.pts.forEach(p=>p.sel=false);
        this.lnc.clearRect(0,0,this.w,this.h);
        this.seqEl.textContent='Secuencia: –';
        this.valEl.value = '';
      }
      move(e){
        if(!this.d)return;
        e.preventDefault();
        const p=this.pos(e),
              h=this.hit(p);
        if(h){
          h.sel=true;
          this.path.push(h);
        }
        this.render(p);
      }
      end(){
        if(!this.d)return;
        this.d=false;
        const seq=this.path.map(p=>p.id);
        this.seqEl.textContent='Secuencia: '+(seq.length ? seq.join(' → ') : '–');
        this.valEl.value=seq.join(',');
      }
      render(c){
        this.lnc.clearRect(0,0,this.w,this.h);
        if(!this.path.length)return;
        this.lnc.strokeStyle='#FF6900';
        this.lnc.lineWidth=4;
        this.lnc.lineCap='round';
        this.lnc.beginPath();
        this.lnc.moveTo(this.path[0].x,this.path[0].y);
        this.path.forEach(p=>this.lnc.lineTo(p.x,p.y));
        if(this.d)this.lnc.lineTo(c.x,c.y);
        this.lnc.stroke();
        this.path.forEach(p=>{
          this.lnc.beginPath();
          this.lnc.arc(p.x,p.y,this.r/2,0,2*Math.PI);
          this.lnc.fillStyle='#FF6900';
          this.lnc.fill();
        });
      }
    }

        pdf.setTextColor(0);

        pdf.setFontSize(8);
        pdf.setFont('helvetica', 'normal');
        pdf.text(`N° Recibo: ${numeroRecibo}`, marginLeft, y);
        pdf.text(`Fecha: ${fecha.toLocaleDateString()} ${fecha.toLocaleTimeString().slice(0, 5)}`, 200 - marginLeft, y, { align: 'right' });

        y += 8;
        pdf.setFont('helvetica', 'bold');
        pdf.text('DATOS DEL CLIENTE', marginLeft, y);
        pdf.setDrawColor(200);
        pdf.line(marginLeft, y + 1, 195, y + 1);

        y += 5;
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(9);
        pdf.text(`Nombre: ${nombreCompleto}`, marginLeft, y);
        y += 5;
        pdf.text(`Telefono: ${telefono}`, marginLeft, y);

        y += 8;
        pdf.setFont('helvetica', 'bold');
        pdf.text('DATOS DEL EQUIPO', marginLeft, y);
        pdf.setDrawColor(200);
        pdf.line(marginLeft, y + 1, 195, y + 1);

        pdf.setFont('helvetica', 'normal');
        y += 5;
        pdf.text(`Marca: ${marca}`, marginLeft, y);
        y += 5;
        pdf.text(`Modelo: ${modelo}`, marginLeft, y);

        pdf.text(`¿Enciende?: ${enciende}`, marginLeft, y);

        const confirmation = document.getElementById('confirmation');
        confirmation.textContent = `✅ Recibo ${numeroRecibo} generado con exito`;
        confirmation.style.display = 'block';

      } catch (err) {
        alert('❌ Error al generar PDF: ' + err.message);

        loading.style.display = 'none';
      }
    });
  });
