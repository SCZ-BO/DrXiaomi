<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dr. Xiaomi">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Dr. Xiaomi">
  <title>Dr. Xiaomi · Pantallas</title>
  
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Dr. Xiaomi%22,
    %22short_name%22:%22Xiaomi%22,
    %22description%22:%22Gesti%C3%B3n%20de%20precios%20de%20pantallas%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22theme_color%22:%22%230f172a%22,
    %22background_color%22:%22%230f172a%22,
    %22icons%22:[
      {%22src%22:%22https://via.placeholder.com/192x192/f97316/white?text=D%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},
      {%22src%22:%22https://via.placeholder.com/512x512/f97316/white?text=D%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}
    ]
  }">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-gradient-start: #0f172a;
      --bg-gradient-end: #020617;
      --surface: rgba(30, 41, 59, 0.85);
      --surface-hover: rgba(51, 65, 85, 0.95);
      --border: rgba(148, 163, 184, 0.15);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #f97316;
      --accent-glow: rgba(249, 115, 22, 0.3);
      --success: #10b981;
      --card-radius: 16px;
      --transition: 200ms cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    [data-theme="light"] {
      --bg-gradient-start: #f8fafc;
      --bg-gradient-end: #e2e8f0;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-hover: rgba(255, 255, 255, 1);
      --border: rgba(203, 213, 225, 0.5);
      --text-primary: #0f172a;
      --text-secondary: #475569;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    .app {
      max-width: 100%;
      height: 100%;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header con efecto de blur */
    .header {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 10px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 12px;
      transition: transform 0.1s ease;
    }

    .icon-btn:active {
      transform: scale(0.95);
    }

    /* Pull to refresh */
    .pull-to-refresh {
      position: fixed;
      top: -50px;
      left: 0;
      right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      transition: transform 0.2s;
      z-index: 99;
    }

    .pull-to-refresh i {
      font-size: 20px;
      color: var(--accent);
    }

    /* Search */
    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 40px 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    /* Cards View */
    .cards-view {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      padding-bottom: 80px;
    }

    .product-card {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-radius: var(--card-radius);
      padding: 12px;
      border: 1px solid var(--border);
      transition: var(--transition);
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card:active {
      transform: scale(0.98);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-title {
      font-weight: 700;
      font-size: 15px;
    }

    .card-model {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
      font-size: 11px;
    }

    .card-type {
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,0,0,0.2);
    }

    .card-type.oled {
      color: #f97316;
    }

    .card-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .card-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      padding: 4px 12px;
      border-radius: 30px;
      background: rgba(249, 115, 22, 0.1);
      transition: all 0.1s ease;
    }

    .card-price:active {
      background: var(--accent);
      color: white;
      transform: scale(0.95);
    }

    /* Bottom Navigation con efecto */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 6px 16px 12px;
      gap: 4px;
      z-index: 100;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 30px;
      cursor: pointer;
      font-size: 10px;
      transition: all 0.1s ease;
    }

    .nav-item:active {
      transform: scale(0.95);
    }

    .nav-item.active {
      color: var(--accent);
      background: var(--surface);
    }

    .nav-item i {
      font-size: 18px;
    }

    /* Loading skeleton mejorado */
    .skeleton-card {
      background: var(--surface);
      border-radius: var(--card-radius);
      padding: 12px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Modal mejorado */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: var(--surface);
      border-radius: 24px;
      padding: 20px;
      max-width: 300px;
      width: 100%;
      animation: modalSlide 0.2s ease;
    }

    @keyframes modalSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 30px;
      color: white;
      font-size: 12px;
      z-index: 150;
      white-space: nowrap;
      animation: toastIn 0.2s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* Main content area con scroll */
    .main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .results-count {
      padding: 6px 16px;
      font-size: 11px;
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .install-banner {
      background: var(--surface);
      margin: 8px 12px;
      padding: 10px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-100%);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar personalizado */
    .main-content::-webkit-scrollbar {
      width: 3px;
    }

    .main-content::-webkit-scrollbar-track {
      background: var(--surface);
    }

    .main-content::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Pull to refresh indicator -->
  <div class="pull-to-refresh" id="pullToRefresh">
    <i class="fas fa-arrow-down"></i>
  </div>

  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📱</div>
        <h1>Dr. Xiaomi</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="techModeBtn" title="Modo Técnico">
          <i class="fas fa-microchip"></i>
        </button>
        <button class="icon-btn" id="receiptBtn" title="Recibo">
          <i class="fas fa-receipt"></i>
        </button>
        <button class="icon-btn" id="installBtn" style="display: none;" title="Instalar App">
          <i class="fas fa-download"></i>
        </button>
        <button class="icon-btn" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
    
    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Buscar modelo...">
      <div class="search-actions">
        <button id="clearSearchBtn"><i class="fas fa-times"></i></button>
      </div>
    </div>
  </header>

  <div class="main-content" id="mainContent">
    <div id="resultsCount" class="results-count"></div>
    <div id="resultsContainer"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>Inicio</span></button>
    <button class="nav-item" data-tab="favorites"><i class="fas fa-heart"></i><span>Favoritos</span></button>
    <button class="nav-item" data-tab="compare"><i class="fas fa-chart-line"></i><span>Comparar</span></button>
  </nav>
</div>

<!-- Modales -->
<div id="techModal" class="modal">
  <div class="modal-content">
    <h3><i class="fas fa-microchip"></i> Modo Técnico</h3>
    <input type="password" id="techPassword" placeholder="Clave">
    <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 10px;">
      <button onclick="closeModal('techModal')" style="flex:1; padding: 10px;">Cancelar</button>
      <button id="confirmTechBtn" style="flex:1; padding: 10px; background: #f97316; border: none; border-radius: 30px; color: white;">Acceder</button>
    </div>
  </div>
</div>

<script>
  // Configuración
  const CONFIG = {
    dataSources: [
      { name: "J&A", url: "https://xiaomi.scz.red/precio/data/ja2.csv" },
      { name: "CentralCell", url: "https://xiaomi.scz.red/precio/data/centralcel.csv" },
      { name: "Osmobil", url: "https://xiaomi.scz.red/precio/data/osmobil.csv" },
      { name: "CFH LP", url: "https://xiaomi.scz.red/precio/data/CFH.csv" },
      { name: "BITE", url: "https://xiaomi.scz.red/precio/data/boe.csv" }
    ],
    passwords: { tech: "123456" }
  };

  let allData = [];
  let filteredData = [];
  let techMode = false;
  let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
  let currentTab = "home";
  let deferredPrompt = null;
  let pullStartY = 0;
  let pullMove = false;

  const container = document.getElementById("resultsContainer");
  const searchInput = document.getElementById("searchInput");
  const resultsCount = document.getElementById("resultsCount");
  const mainContent = document.getElementById("mainContent");

  // Service Worker y PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW error:', err));
  }

  // Detectar instalación PWA
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const installBtn = document.getElementById('installBtn');
    installBtn.style.display = 'flex';
    installBtn.onclick = () => {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        installBtn.style.display = 'none';
        deferredPrompt = null;
      });
    };
  });

  // Pull to Refresh
  let touchStartY = 0;
  let isRefreshing = false;

  mainContent.addEventListener('touchstart', (e) => {
    if (mainContent.scrollTop === 0) {
      touchStartY = e.touches[0].clientY;
    }
  });

  mainContent.addEventListener('touchmove', (e) => {
    if (mainContent.scrollTop === 0 && !isRefreshing) {
      const moveY = e.touches[0].clientY;
      const pullDistance = moveY - touchStartY;
      if (pullDistance > 50) {
        e.preventDefault();
        refreshData();
      }
    }
  });

  async function refreshData() {
    if (isRefreshing) return;
    isRefreshing = true;
    const pullEl = document.getElementById('pullToRefresh');
    pullEl.style.transform = 'translateY(50px)';
    
    await loadData();
    
    setTimeout(() => {
      pullEl.style.transform = '';
      isRefreshing = false;
      showToast('✅ Actualizado');
    }, 1000);
  }

  // Haptic feedback (vibración)
  function vibrate() {
    if ('vibrate' in navigator) {
      navigator.vibrate(50);
    }
  }

  async function init() {
    showSkeleton();
    await loadData();
    setupEventListeners();
    render();
    
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme === "light") toggleTheme();
    
    // Detectar modo offline
    window.addEventListener('online', () => showToast('✅ Conexión restaurada'));
    window.addEventListener('offline', () => showToast('⚠️ Modo offline'));
  }

  async function loadData() {
    try {
      // Intentar cargar desde caché primero
      const cached = localStorage.getItem('products_cache');
      if (cached && !navigator.onLine) {
        allData = JSON.parse(cached);
        filteredData = [...allData];
        updateResultsCount();
        render();
        return;
      }
      
      allData = [];
      for (const source of CONFIG.dataSources) {
        try {
          const data = await fetchCSV(source.url, source.name);
          allData.push(...data);
        } catch (error) {
          console.error(`Error cargando ${source.name}:`, error);
        }
      }
      
      // Guardar en caché
      localStorage.setItem('products_cache', JSON.stringify(allData));
      
      filteredData = [...allData];
      updateResultsCount();
    } catch (error) {
      showError();
    }
  }

  async function fetchCSV(url, providerName) {
    const response = await fetch(url);
    const text = await response.text();
    return parseCSV(text, providerName);
  }

  function parseCSV(text, providerName) {
    const lines = text.split("\n").filter(line => line.trim() !== "");
    if (lines.length < 2) return [];
    
    const data = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      
      const columns = parseCSVLine(line);
      
      if (columns.length >= 6) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const proveedor = cleanText(columns[3]) || providerName;
        const precio_compra = parsePrice(columns[4]);
        const precio_venta = parsePrice(columns[5]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: proveedor,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      } else if (columns.length >= 5) {
        const marca = cleanText(columns[0]);
        const modelo = cleanText(columns[1]);
        const tipo = cleanText(columns[2]).toUpperCase();
        const precio_compra = parsePrice(columns[3]);
        const precio_venta = parsePrice(columns[4]);
        
        if (modelo && modelo !== "Modelo" && modelo !== "") {
          data.push({
            id: crypto.randomUUID(),
            marca: marca || "N/A",
            modelo: modelo,
            tipo: tipo === "OLED" ? "OLED" : "LCD",
            proveedor: providerName,
            compra: precio_compra,
            venta: precio_venta
          });
        }
      }
    }
    return data;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === "," && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result.map(field => field.replace(/^"|"$/g, ""));
  }

  function cleanText(text) {
    if (!text) return "";
    return text.trim().replace(/^"|"$/g, "");
  }

  function parsePrice(priceStr) {
    if (!priceStr || priceStr.trim() === "") return 0;
    let str = priceStr.toString().trim();
    str = str.replace(/[^\d.,-]/g, "");
    const num = parseFloat(str.replace(/,/g, "."));
    if (isNaN(num)) return 0;
    return Math.round(num);
  }

  function render() {
    if (!container) return;
    
    let dataToShow = currentTab === "favorites" 
      ? filteredData.filter(p => favorites.includes(p.id))
      : filteredData;
    
    if (currentTab === "compare") {
      showCompareModal();
      return;
    }
    
    container.innerHTML = renderCards(dataToShow);
    updateResultsCount();
  }

  function renderCards(data) {
    if (data.length === 0) {
      return `<div class="empty-state"><i class="fas fa-search"></i><p>No se encontraron resultados</p></div>`;
    }
    
    return `
      <div class="cards-view">
        ${data.map((item, index) => `
          <div class="product-card" style="animation-delay: ${index * 0.02}s">
            <div class="card-header">
              <div>
                <div class="card-title">${escapeHtml(item.marca)}</div>
                <div class="card-model">${escapeHtml(item.modelo)}</div>
              </div>
              <button class="fav-btn" onclick="toggleFavorite('${item.id}')">
                <i class="fas fa-heart" style="color: ${favorites.includes(item.id) ? '#ef4444' : '#94a3b8'}"></i>
              </button>
            </div>
            <div class="card-specs">
              <span class="card-type ${item.tipo === 'OLED' ? 'oled' : 'lcd'}">${item.tipo}</span>
              ${techMode ? `<span style="color: #fbbf24;">${escapeHtml(item.proveedor)}</span>` : ''}
              ${techMode ? `<span>Compra: Bs. ${item.compra.toLocaleString()}</span>` : ''}
            </div>
            <div class="card-price-row">
              <span class="card-price" onclick="copyPriceToClipboard('${item.id}')">Bs. ${item.venta.toLocaleString()}</span>
              <button class="share-card-btn" onclick="shareToWhatsApp('${item.id}')" style="background: #25D366; border: none; padding: 6px 12px; border-radius: 30px; color: white; font-size: 11px;"><i class="fab fa-whatsapp"></i> Enviar</button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function search(term) {
    if (!term.trim()) {
      filteredData = [...allData];
    } else {
      const lowerTerm = term.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      filteredData = allData.filter(item => {
        const modeloNorm = item.modelo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const marcaNorm = item.marca.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        return modeloNorm.includes(lowerTerm) || marcaNorm.includes(lowerTerm);
      });
    }
    render();
  }

  function updateResultsCount() {
    if (resultsCount) {
      const total = currentTab === "favorites" 
        ? filteredData.filter(p => favorites.includes(p.id)).length
        : filteredData.length;
      resultsCount.textContent = `${total} producto${total !== 1 ? 's' : ''}`;
    }
  }

  function copyPriceToClipboard(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    vibrate(); // Feedback háptico
    
    const message = `📱 *PRECIO DE PANTALLA*\n${product.marca} ${product.modelo}\n💰 Precio: Bs. ${product.venta.toLocaleString()}`;
    
    navigator.clipboard.writeText(message).then(() => {
      showToast("✅ Precio copiado");
    }).catch(() => {
      showToast("❌ Error");
    });
  }

  function shareToWhatsApp(productId) {
    const product = allData.find(p => p.id === productId);
    if (!product) return;
    
    vibrate();
    
    const message = `📱 *PRECIO DE PANTALLA*\n${product.marca} ${product.modelo}\n💰 Precio: Bs. ${product.venta.toLocaleString()}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, "_blank");
  }

  function toggleFavorite(productId) {
    vibrate();
    
    if (favorites.includes(productId)) {
      favorites = favorites.filter(id => id !== productId);
      showToast("⭐ Eliminado");
    } else {
      favorites.push(productId);
      showToast("❤️ Agregado");
    }
    localStorage.setItem("favorites", JSON.stringify(favorites));
    render();
  }

  function showTechModal() {
    document.getElementById("techModal").style.display = "flex";
    document.getElementById("techPassword").focus();
  }

  function closeModal(modalId) {
    document.getElementById(modalId).style.display = "none";
    const input = document.querySelector(`#${modalId} input`);
    if (input) input.value = "";
  }

  function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1500);
  }

  function showSkeleton() {
    if (container) {
      container.innerHTML = `
        <div class="cards-view">
          ${Array(5).fill().map(() => `
            <div class="skeleton-card">
              <div class="skeleton" style="height: 80px;"></div>
            </div>
          `).join('')}
        </div>
      `;
    }
  }

  function showError() {
    if (container) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>Error cargando datos</p>
          <button onclick="location.reload()" style="margin-top: 16px; padding: 10px 20px; background: #f97316; border: none; border-radius: 30px; color: white;">Reintentar</button>
        </div>
      `;
    }
  }

  function toggleTheme() {
    vibrate();
    const isLight = document.documentElement.getAttribute("data-theme") === "light";
    document.documentElement.setAttribute("data-theme", isLight ? "dark" : "light");
    localStorage.setItem("theme", isLight ? "dark" : "light");
    const icon = document.querySelector("#themeToggle i");
    if (icon) icon.className = isLight ? "fas fa-moon" : "fas fa-sun";
  }

  function showCompareModal() {
    const compareData = filteredData.slice(0, 4);
    let html = '<div style="display: flex; flex-direction: column; gap: 10px;">';
    compareData.forEach(p => {
      html += `
        <div style="background: var(--surface); padding: 12px; border-radius: 12px;">
          <strong>${escapeHtml(p.marca)} ${escapeHtml(p.modelo)}</strong><br>
          <span style="color: #f97316; font-weight: 700;">Bs. ${p.venta.toLocaleString()}</span>
        </div>
      `;
    });
    html += '</div>';
    
    const modalHtml = `
      <div id="compareModal" class="modal" style="display: flex;">
        <div class="modal-content">
          <h3><i class="fas fa-chart-line"></i> Comparar</h3>
          ${html}
          <div class="modal-buttons" style="margin-top: 16px;">
            <button onclick="closeModal('compareModal')" style="flex:1; padding: 10px; border: none; border-radius: 30px;">Cerrar</button>
          </div>
        </div>
      </div>
    `;
    
    const existing = document.getElementById("compareModal");
    if (existing) existing.remove();
    document.body.insertAdjacentHTML("beforeend", modalHtml);
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === "&") return "&amp;";
      if (m === "<") return "&lt;";
      if (m === ">") return "&gt;";
      return m;
    });
  }

  function setupEventListeners() {
    searchInput?.addEventListener("input", (e) => search(e.target.value));
    
    document.getElementById("clearSearchBtn")?.addEventListener("click", () => {
      searchInput.value = "";
      search("");
    });
    
    document.getElementById("techModeBtn")?.addEventListener("click", () => {
      vibrate();
      showTechModal();
    });
    
    document.getElementById("confirmTechBtn")?.addEventListener("click", () => {
      const pwd = document.getElementById("techPassword").value;
      if (pwd === CONFIG.passwords.tech) {
        techMode = true;
        closeModal("techModal");
        vibrate();
        showToast("✅ Modo técnico activado");
        render();
      } else {
        vibrate();
        showToast("❌ Clave incorrecta");
      }
    });
    
    document.getElementById("receiptBtn")?.addEventListener("click", () => {
      vibrate();
      window.open("http://xiaomi.scz.red/1/", "_blank");
    });
    
    document.getElementById("themeToggle")?.addEventListener("click", toggleTheme);
    
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        vibrate();
        currentTab = item.dataset.tab;
        document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
        item.classList.add("active");
        render();
      });
    });
  }

  // Exponer funciones globales
  window.copyPriceToClipboard = copyPriceToClipboard;
  window.shareToWhatsApp = shareToWhatsApp;
  window.toggleFavorite = toggleFavorite;
  window.closeModal = closeModal;
  window.refreshData = refreshData;

  init();
</script>
</body>
</html>
